defaults:
  - default_schema

epochs: 100
batch_size: 128
lr: 1.0e-3
optimizer: adam
weight_decay: 0.0
warmup_epochs: 0
# Optional cosine horizon. null means use training.epochs.
lr_schedule_epochs: null
# Final cosine LR factor relative to training.lr.
lr_min_factor: 0.0
# Epoch-based cadences. Set to 0 to disable periodic checkpointing or eval.
checkpoint_every: 10
eval_every: 10
# Optional optimizer-step cap for smoke tests. null means train by epochs.
max_steps: null
resume: null
run_dir: null
run_prefix: ${dataset.name}

# --- Logging & instrumentation ---
log_every: 10
log_moe_stats: false
grad_clip: 1.0

# --- EMA (0 = disabled; use 0.9999 for long runs) ---
ema_decay: 0

# Precision (fp32, fp16, bf16), autocast plus GradScaler for fp16 only.
precision: null

# Optional PT2 model compilation. compile_mode examples: default, reduce-overhead, max-autotune.
compile_model: false
compile_mode: null
compile_backend: null

# Loss mode enum: mse | masked_mse.
loss_mode: mse
# Model-only initialization controls.
init_from: null
init_from_weights: raw
