# @package _global_
defaults:
  - override /dataset: imagenet256_latent_mmap
  - override /model: classcond_deferred_dit_imagenet256_latent_b2_moe_layerwise_h768_d6_e16_c2_moew05
  - override /vae: sd_vae_ft_ema

training:
  run_prefix: imagenet256_latent_dit_b2_moe_layerwise_h768_d6_e16_c2_moew05
  batch_size: 2048
  epochs: 400
  lr: 1.0e-4
  optimizer: adamw
  weight_decay: 0.01
  warmup_epochs: 2
  checkpoint_every: 10
  eval_every: 10
  num_workers: 8
  precision: bf16
  ema_decay: 0.9999
  p_uncond: 0.1
  loss_mode: masked_mse

sample_logger:
  n_samples: 64
  num_steps: 200
  latent_shape: [4, 32, 32]
  guidance_scale: 2.0

inference:
  n_samples: 64
  save_path: imagenet256_latent_dit_b2_moe_layerwise_h768_d6_e16_c2_moew05_samples.png
  class_sampler:
    num_classes: 1000
    guidance_scale: 3.0
    probs: null
    class_names: null
  sampler:
    num_steps: 200
    latent_shape: [4, 32, 32]
