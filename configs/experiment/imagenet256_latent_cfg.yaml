# @package _global_
defaults:
  - override /dataset: imagenet256_latent
  - override /model: classcond_unet_imagenet256_latent
  - override /vae: sd_vae_ft_ema

training:
  run_prefix: imagenet256_latent_cfg
  batch_size: 64
  epochs: 100
  checkpoint_every: 1
  eval_every: 10
  num_workers: 8
  precision: bf16
  ema_decay: 0.9999
  p_uncond: 0.1

sample_logger:
  n_samples: 64
  num_steps: 200
  latent_shape: [4, 32, 32]
  guidance_scale: 2.0

inference:
  n_samples: 64
  save_path: imagenet256_latent_cfg_samples.png
  class_sampler:
    num_classes: 1000
    guidance_scale: 3.0
    probs: null
    class_names: null
  sampler:
    num_steps: 200
    latent_shape: [4, 32, 32]
