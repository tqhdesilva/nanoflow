# @package _global_
defaults:
  - override /dataset: imagenet256_latent_mmap
  - override /model: classcond_deferred_dit_imagenet256_latent_m2_moe_layerwise_h1024_d20_e16_c2_moew05
  - override /vae: sd_vae_ft_ema

model:
  masker: null

training:
  run_prefix: imagenet256_latent_dit_m2_moe_layerwise_h1024_d20_e16_c2_moew05_unmasked20
  batch_size: 96
  epochs: 20
  lr_schedule_epochs: 20
  lr_min_factor: 0.05
  lr: 1.0e-5
  optimizer: adamw
  weight_decay: 0.01
  warmup_epochs: 1
  checkpoint_every: 10
  eval_every: 5
  num_workers: 8
  precision: bf16
  compile_model: true
  compile_mode: reduce-overhead
  ema_decay: 0.0
  p_uncond: 0.1
  loss_mode: mse
  init_from: null
  init_from_weights: raw

sample_logger:
  n_samples: 64
  num_steps: 200
  latent_shape: [4, 32, 32]
  guidance_scale: 2.0

inference:
  n_samples: 64
  save_path: imagenet256_latent_dit_m2_moe_layerwise_h1024_d20_e16_c2_moew05_unmasked20_samples.png
  class_sampler:
    num_classes: 1000
    guidance_scale: 3.0
    probs: null
    class_names: null
  sampler:
    num_steps: 200
    latent_shape: [4, 32, 32]
