# @package _global_
defaults:
  - override /dataset: cifar10
  - override /model: unet_cifar

training:
  num_workers: 4
  batch_size: 256
  epochs: 500

train_unit:
  logger:
    n_samples: 64
    num_steps: 200
    latent_shape: [3, 32, 32]

inference:
  n_samples: 64
  save_path: cifar10_samples.png
  infer_unit:
    num_steps: 200
    latent_shape: [3, 32, 32]
