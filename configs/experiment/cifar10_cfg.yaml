# @package _global_
defaults:
  - override /dataset: cifar10
  - override /model: classcond_unet_cifar

training:
  num_workers: 4
  batch_size: 256
  epochs: 500
  log_every: 20
  p_uncond: 0.1

sample_logger:
  n_samples: 64
  num_steps: 200
  latent_shape: [3, 32, 32]
  guidance_scale: 2.0

inference:
  n_samples: 64
  save_path: cifar10_cfg_samples.png
  class_sampler:
    num_classes: 10
    guidance_scale: 3.0
    probs: null
    class_names:
      - airplane
      - automobile
      - bird
      - cat
      - deer
      - dog
      - frog
      - horse
      - ship
      - truck
  sampler:
    num_steps: 200
    latent_shape: [3, 32, 32]
