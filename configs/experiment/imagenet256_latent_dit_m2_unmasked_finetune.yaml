# @package _global_
defaults:
  - override /dataset: imagenet256_latent_mmap
  - override /model: classcond_deferred_dit_imagenet256_latent_m2
  - override /vae: sd_vae_ft_ema

model:
  masker: null

training:
  run_prefix: imagenet256_latent_dit_m2_unmasked_finetune
  batch_size: 96
  epochs: 20
  lr: 5.0e-5
  warmup_epochs: 1
  checkpoint_every: 1
  eval_every: 5
  num_workers: 8
  precision: bf16
  ema_decay: 0.9999
  p_uncond: 0.1
  loss_mode: mse
  init_from: null
  init_from_weights: raw

sample_logger:
  n_samples: 64
  num_steps: 200
  latent_shape: [4, 32, 32]
  guidance_scale: 2.0

inference:
  n_samples: 64
  save_path: imagenet256_latent_dit_m2_unmasked_finetune_samples.png
  class_sampler:
    num_classes: 1000
    guidance_scale: 3.0
    probs: null
    class_names: null
  sampler:
    num_steps: 200
    latent_shape: [4, 32, 32]

resources:
  infra: runpod
  accelerators: H100-SXM:1
  image_id: docker:ghcr.io/tqhdesilva/nanoflow:runpod-cu124
  disk_size: 100
  job_recovery:
    max_restarts_on_errors: 5
