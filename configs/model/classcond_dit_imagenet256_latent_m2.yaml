defaults:
  - classcond_dit_imagenet256_latent_m2_schema

_target_: models_dit.ClassCondDiT
_recursive_: true
in_ch: 4
latent_size: 32
patch_size: 2
num_classes: 1000
time_dim: 1024
class_dim: 1024
pos_embedding:
  _target_: models_dit.RoPE2D
  base: 10000.0
use_gradient_checkpointing: true
backbone:
  _target_: models_dit.DiTBackbone
  hidden_size: 1024
  use_gradient_checkpointing: ${..use_gradient_checkpointing}
  blocks:
    - &dit_m2_block
      _target_: models_dit.DiTBlock
      hidden_size: ${...hidden_size}
      attention:
        _target_: models_dit.SelfAttention
        hidden_size: ${..hidden_size}
        num_heads: 16
      ffn:
        _target_: models_dit.DenseFFN
        hidden_size: ${..hidden_size}
        mlp_width: 4096
        activation:
          _target_: torch.nn.GELU
          approximate: tanh
    - *dit_m2_block
    - *dit_m2_block
    - *dit_m2_block
    - *dit_m2_block
    - *dit_m2_block
    - *dit_m2_block
    - *dit_m2_block
    - *dit_m2_block
    - *dit_m2_block
    - *dit_m2_block
    - *dit_m2_block
