defaults:
  - classcond_deferred_dit_imagenet256_latent_tiny_schema

_target_: models_dit.ClassCondDeferredMaskingDiT
_recursive_: true
in_ch: 4
latent_size: 32
patch_size: 2
num_classes: 1000
time_dim: 128
class_dim: 128
pos_embedding:
  _target_: models_dit.RoPE2D
  base: 10000.0
use_gradient_checkpointing: false
patch_mixer:
  _target_: models_dit.PatchMixer
  hidden_size: 128
  use_gradient_checkpointing: ${..use_gradient_checkpointing}
  blocks:
    - _target_: models_dit.DiTBlock
      hidden_size: ${...hidden_size}
      attention:
        _target_: models_dit.SelfAttention
        hidden_size: ${..hidden_size}
        num_heads: 4
      ffn:
        _target_: models_dit.DenseFFN
        hidden_size: ${..hidden_size}
        mlp_width: 512
        activation:
          _target_: torch.nn.GELU
          approximate: tanh
masker:
  _target_: models_dit.RandomTokenMasker
  mask_ratio: 0.75
backbone:
  _target_: models_dit.DiTBackbone
  hidden_size: 128
  use_gradient_checkpointing: ${..use_gradient_checkpointing}
  blocks:
    - _target_: models_dit.DiTBlock
      hidden_size: ${...hidden_size}
      attention:
        _target_: models_dit.SelfAttention
        hidden_size: ${..hidden_size}
        num_heads: 4
      ffn:
        _target_: models_dit.DenseFFN
        hidden_size: ${..hidden_size}
        mlp_width: 512
        activation:
          _target_: torch.nn.GELU
          approximate: tanh
    - _target_: models_dit.DiTBlock
      hidden_size: ${...hidden_size}
      attention:
        _target_: models_dit.SelfAttention
        hidden_size: ${..hidden_size}
        num_heads: 4
      ffn:
        _target_: models_dit.DenseFFN
        hidden_size: ${..hidden_size}
        mlp_width: 512
        activation:
          _target_: torch.nn.GELU
          approximate: tanh
