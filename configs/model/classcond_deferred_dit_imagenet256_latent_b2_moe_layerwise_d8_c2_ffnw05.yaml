defaults:
  - classcond_deferred_dit_imagenet256_latent_b2_moe_layerwise_schema

_target_: models_dit.ClassCondDeferredMaskingDiT
_recursive_: true
in_ch: 4
latent_size: 32
patch_size: 2
num_classes: 1000
patch_mixer:
