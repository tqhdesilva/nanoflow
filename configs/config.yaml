defaults:
  - dataset: moons
  - model: mlp
  - flow: condot
  - training: default
  - experiment: moons
  - metrics: none
  - _self_

device: cpu
distributed: null   # null | ddp | fsdp
runs_dir: runs

train_unit:
  _target_: unit.FlowMatchingUnit
  model: ${model}
  flow: ${flow}
  training: ${training}
  distributed: ${distributed}

train_loader:
  _target_: unit.build_dataloader
  dataset: ${dataset}
  batch_size: ${training.batch_size}
  num_workers: ${training.num_workers}
  train: true

val_loader:
  _target_: unit.build_dataloader
  dataset: ${dataset}
  batch_size: ${training.batch_size}
  num_workers: ${training.num_workers}
  train: false

sample_logger: null

inference:
  infer_unit:
    _target_: unit.InferenceUnit
    model: ${model}
    device: ${device}
    checkpoint: null

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
