defaults:
  - dataset: moons
  - model: mlp
  - flow: condot
  - training: default
  - experiment: moons
  - _self_

device: cpu

train_unit:
  _target_: unit.FlowMatchingUnit
  dataset: ${dataset}
  model: ${model}
  flow: ${flow}
  training: ${training}
  device: ${device}
  runs_dir: runs

inference:
  infer_unit:
    _target_: unit.InferenceUnit
    model: ${model}
    device: ${device}
    checkpoint: null

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
