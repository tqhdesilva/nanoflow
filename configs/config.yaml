defaults:
  - dataset: moons
  - model: mlp
  - flow: condot
  - optional vae: null
  - optional vae_transform: null
  - training: default
  - _self_
  - experiment: moons
  - metrics: none

device: cpu
distributed: null   # null | ddp | fsdp
runs_dir: runs

trainer:
  _target_: train.Trainer
  model: ${model}
  flow: ${flow}
  training: ${training}
  distributed: ${distributed}
  retryer: ${retryer}

retryer:
  _target_: retry.Retryer
  max_retries: 3
  base_delay_seconds: 1.0
  max_delay_seconds: 30.0
  jitter_seconds: 0.25
  retryable_os_errnos:
    - EIO
    - ESTALE
    - ETIMEDOUT
    - ECONNRESET
    - ECONNABORTED
    - ENETDOWN
    - ENETRESET
    - ENETUNREACH
    - EHOSTUNREACH
    - EAGAIN
    - EBUSY
  retryable_runtime_error_substrings:
    - PytorchStreamWriter
    - file write failed
    - unexpected pos
    - inline_container.cc

train_loader:
  _target_: datasets.build_dataloader
  dataset: ${dataset}
  batch_size: ${training.batch_size}
  num_workers: ${training.num_workers}
  train: true
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2

val_loader:
  _target_: datasets.build_dataloader
  dataset: ${dataset}
  batch_size: ${training.batch_size}
  num_workers: ${training.num_workers}
  train: false
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2

sample_logger: null

inference:
  sampler:
    _target_: inference.FlowSampler
    model: ${model}
    device: ${device}
    checkpoint: null

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
