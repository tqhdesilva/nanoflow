defaults:
  - dataset: moons
  - model: mlp
  - flow: condot
  - training: default
  - experiment: moons
  - metrics: none
  - _self_

device: cpu
distributed: null   # null | ddp | fsdp
runs_dir: runs

trainer:
  _target_: train.Trainer
  model: ${model}
  flow: ${flow}
  training: ${training}
  distributed: ${distributed}

train_loader:
  _target_: datasets.build_dataloader
  dataset: ${dataset}
  batch_size: ${training.batch_size}
  num_workers: ${training.num_workers}
  train: true
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2

val_loader:
  _target_: datasets.build_dataloader
  dataset: ${dataset}
  batch_size: ${training.batch_size}
  num_workers: ${training.num_workers}
  train: false
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2

sample_logger: null

inference:
  sampler:
    _target_: inference.FlowSampler
    model: ${model}
    device: ${device}
    checkpoint: null

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
