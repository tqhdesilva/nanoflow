name: RunPod Docker image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - uv.lock
      - scripts/runpod_cuda_smoke.py
      - .github/workflows/docker-runpod.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - uv.lock
      - scripts/runpod_cuda_smoke.py
      - .github/workflows/docker-runpod.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: runpod-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}
  PYTORCH_INDEX_URL: https://download.pytorch.org/whl/cu124
  PYTORCH_PACKAGES: torch==2.6.0+cu124 torchvision==0.21.0+cu124

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            PYTORCH_INDEX_URL=${{ env.PYTORCH_INDEX_URL }}
            PYTORCH_PACKAGES=${{ env.PYTORCH_PACKAGES }}
          tags: |
            ${{ env.IMAGE }}:runpod-cu124
            ${{ env.IMAGE }}:runpod-cu124-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
