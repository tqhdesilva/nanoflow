name: nf-imagenet-ddp

# Launch after the network volume has hydrated latents at LATENT_CACHE_LINK.
# Pass the same RunPod data center used for the network volume:
#   sky launch -c nf-imagenet-ddp --infra runpod/<country>/<data-center> cloud/runpod/imagenet256-latent-ddp.yaml

resources:
  infra: runpod
  accelerators: H100:8
  image_id: docker:ghcr.io/tqhdesilva/nanoflow:runpod-cu124
  disk_size: 100

volumes:
  /workspace: nf-imagenet256

envs:
  LATENT_CACHE_LINK: /workspace/latent-caches/imagenet256/current
  RUNS_DIR: /workspace/runs
  HF_HOME: /workspace/.cache/huggingface
  TORCH_HOME: /workspace/.cache/torch
  TMPDIR: /workspace/.tmp
  LOAD_RUNPOD_ENV: "0"
  USE_IMAGE_ENV: "1"
  SKIP_SETUP: "1"
  NPROC_PER_NODE: "8"
  BATCH_SIZE: "64"
  NUM_WORKERS: "8"
  PRECISION: bf16
  CHECKPOINT_EVERY: "1"
  EVAL_EVERY: "10"

run: |
  set -euo pipefail
  cd /app
  mkdir -p "$HF_HOME" "$TORCH_HOME" "$TMPDIR" "$RUNS_DIR"
  nvidia-smi
  python scripts/runpod_cuda_smoke.py
  bash scripts/runpod_train_imagenet256_latent.sh
